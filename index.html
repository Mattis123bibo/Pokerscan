<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Poker AI</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;600&display=swap');
:root {
  --bg: #0d0d0d;
  --surface: #161616;
  --card: #1a1a1a;
  --border: #252525;
  --green: #00c853;
  --green-dim: rgba(0,200,83,0.12);
  --red: #ff3d3d;
  --amber: #ffab00;
  --text: #f0f0f0;
  --muted: #555;
  --muted2: #888;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; display:flex; flex-direction:column; align-items:center; }

header { width:100%; max-width:480px; padding:18px 16px 10px; display:flex; align-items:center; justify-content:space-between; }
.logo { font-family:'Space Mono',monospace; font-size:14px; color:var(--green); letter-spacing:2px; }
.logo span { color:var(--muted); }
.subtitle { font-size:11px; color:var(--muted); font-family:'Space Mono',monospace; letter-spacing:1px; }

.main { width:100%; max-width:480px; padding:0 12px; display:flex; flex-direction:column; gap:12px; }

/* Viewfinder */
.vf { position:relative; width:100%; aspect-ratio:4/3; background:#000; border-radius:14px; overflow:hidden; border:1px solid var(--border); -webkit-transform:translateZ(0); transform:translateZ(0); }
#video { width:100%; height:100%; object-fit:cover; display:block; -webkit-transform:translateZ(0); transform:translateZ(0); -webkit-backface-visibility:hidden; }
#canvas { display:none; }
#preview { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:none; }

.corner { position:absolute; width:20px; height:20px; border-color:var(--green); border-style:solid; opacity:0.5; z-index:5; }
.corner.tl { top:12px; left:12px; border-width:2px 0 0 2px; border-radius:3px 0 0 0; }
.corner.tr { top:12px; right:12px; border-width:2px 2px 0 0; border-radius:0 3px 0 0; }
.corner.bl { bottom:12px; left:12px; border-width:0 0 2px 2px; border-radius:0 0 0 3px; }
.corner.br { bottom:12px; right:12px; border-width:0 2px 2px 0; border-radius:0 0 3px 0; }

.flash { position:absolute; inset:0; background:#fff; opacity:0; pointer-events:none; z-index:20; transition:opacity 0.05s; }
.scan { position:absolute; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,var(--green),transparent); top:0; z-index:15; opacity:0; }
.scan.on { opacity:1; animation:scanmove 1.8s linear infinite; }
@keyframes scanmove { from{top:0%} to{top:100%} }

.badge { position:absolute; top:12px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.7); border:1px solid var(--green); border-radius:20px; padding:3px 10px; font-family:'Space Mono',monospace; font-size:10px; color:var(--green); letter-spacing:1px; white-space:nowrap; z-index:10; }
.badge.busy { color:var(--amber); border-color:var(--amber); animation:pulse 0.8s ease-in-out infinite; }
.badge.off { color:var(--muted); border-color:var(--border); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

.nocam { display:none; flex-direction:column; align-items:center; justify-content:center; height:100%; gap:10px; padding:20px; text-align:center; color:var(--muted); font-size:13px; line-height:1.6; }

/* Controls */
.controls { display:flex; align-items:center; justify-content:center; gap:20px; }
.btn-side { width:44px; height:44px; border-radius:50%; border:1px solid var(--border); background:var(--surface); color:var(--muted2); cursor:pointer; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity 0.2s; -webkit-appearance:none; }
.btn-side.show { opacity:1; pointer-events:all; }
.btn-analyze { border-color:var(--green); color:var(--green); background:var(--green-dim); }
.btn-shutter { width:70px; height:70px; border-radius:50%; background:#fff; border:3px solid rgba(255,255,255,0.2); box-shadow:0 0 0 5px rgba(255,255,255,0.06); cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; -webkit-appearance:none; transition:transform 0.1s; }
.btn-shutter:active { transform:scale(0.9); }
.btn-shutter.off { opacity:0.3; pointer-events:none; }
.shutter-inner { width:55px; height:55px; border-radius:50%; background:#fff; }

/* Result */
.result { display:none; flex-direction:column; gap:10px; }
.result.show { display:flex; }

.result-header { font-family:'Space Mono',monospace; font-size:10px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; padding:0 2px; }

/* Stat cards row */
.stat-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
.stat-card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:10px 10px 8px; display:flex; flex-direction:column; gap:4px; }
.stat-label { font-size:10px; color:var(--muted); font-family:'Space Mono',monospace; letter-spacing:0.5px; text-transform:uppercase; }
.stat-value { font-size:22px; font-weight:600; line-height:1; }
.stat-value.green { color:var(--green); }
.stat-value.amber { color:var(--amber); }
.stat-value.red { color:var(--red); }
.stat-sub { font-size:11px; color:var(--muted2); }

/* Win bar */
.win-bar-wrap { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:12px 14px; display:flex; flex-direction:column; gap:8px; }
.win-bar-label { display:flex; justify-content:space-between; font-size:12px; color:var(--muted2); }
.win-bar-track { height:8px; background:var(--border); border-radius:4px; overflow:hidden; }
.win-bar-fill { height:100%; border-radius:4px; background:linear-gradient(90deg, var(--green), #00e676); transition:width 0.8s ease; }

/* Analysis box */
.analysis-box { background:var(--card); border:1px solid var(--border); border-radius:10px; overflow:hidden; }
.analysis-head { padding:10px 14px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
.analysis-head .tag { font-family:'Space Mono',monospace; font-size:10px; color:var(--green); letter-spacing:1px; text-transform:uppercase; }
.analysis-head .model { font-family:'Space Mono',monospace; font-size:10px; color:var(--muted); }
.analysis-body { padding:14px; font-size:13.5px; line-height:1.7; color:#ccc; white-space:pre-wrap; max-height:400px; overflow-y:auto; -webkit-overflow-scrolling:touch; }

/* Hand detected */
.hand-row { display:flex; gap:8px; }
.hand-card-display { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:10px 14px; flex:1; }
.hand-card-display .hand-label { font-size:10px; color:var(--muted); font-family:'Space Mono',monospace; letter-spacing:0.5px; margin-bottom:4px; }
.hand-card-display .hand-cards { font-size:20px; letter-spacing:3px; }

.cursor { display:inline-block; width:2px; height:13px; background:var(--green); margin-left:2px; vertical-align:text-bottom; animation:blink 0.7s step-end infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

.err { font-size:12px; color:var(--red); text-align:center; padding:6px; display:none; }
.err.show { display:block; }

.spacer { height:24px; }
</style>
</head>
<body>

<header>
  <div class="logo">POKER<span>/</span>AI</div>
  <div class="subtitle">ANALYZER</div>
</header>

<div class="main">

  <div class="vf">
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>
    <div class="flash" id="flash"></div>
    <div class="scan" id="scan"></div>
    <div class="badge" id="badge">LIVE</div>
    <video id="video" autoplay playsinline muted webkit-playsinline></video>
    <canvas id="canvas"></canvas>
    <img id="preview" alt="" />
    <div class="nocam" id="nocam">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.4"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
      <p>Kamera-Zugriff nötig.<br>Safari → Einstellungen → Safari → Kamera → Erlauben</p>
    </div>
  </div>

  <div class="controls">
    <button class="btn-side" id="btnR" type="button">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 109-9M3 3v6h6"/></svg>
    </button>
    <button class="btn-shutter" id="btnS" type="button"><div class="shutter-inner"></div></button>
    <button class="btn-side btn-analyze" id="btnA" type="button">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
    </button>
  </div>

  <div class="err" id="err"></div>

  <div class="result" id="result">

    <div class="result-header">ERKANNTE KARTEN</div>
    <div class="hand-row">
      <div class="hand-card-display">
        <div class="hand-label">MEINE HAND</div>
        <div class="hand-cards" id="myHand">—</div>
      </div>
      <div class="hand-card-display">
        <div class="hand-label">BOARD</div>
        <div class="hand-cards" id="board" style="font-size:14px; letter-spacing:2px;">—</div>
      </div>
    </div>

    <div class="result-header" style="margin-top:2px;">AUSWERTUNG</div>
    <div class="stat-row">
      <div class="stat-card">
        <div class="stat-label">Win %</div>
        <div class="stat-value green" id="winPct">—</div>
        <div class="stat-sub" id="winSub">equity</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Hand Stärke</div>
        <div class="stat-value" id="handStr">—</div>
        <div class="stat-sub" id="handSub">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Gegner</div>
        <div class="stat-value amber" id="opponents">—</div>
        <div class="stat-sub">aktive Spieler</div>
      </div>
    </div>

    <div class="win-bar-wrap" id="winBarWrap" style="display:none;">
      <div class="win-bar-label">
        <span>Gewinnwahrscheinlichkeit</span>
        <span id="winBarPct">0%</span>
      </div>
      <div class="win-bar-track"><div class="win-bar-fill" id="winBar" style="width:0%"></div></div>
    </div>

    <div class="analysis-box">
      <div class="analysis-head">
        <span class="tag">KI Analyse</span>
        <span class="model">claude-sonnet-4</span>
      </div>
      <div class="analysis-body" id="analysisText"></div>
    </div>

  </div>

  <div class="spacer"></div>
</div>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const preview = document.getElementById('preview');
const badge = document.getElementById('badge');
const nocam = document.getElementById('nocam');
const scan = document.getElementById('scan');
const flash = document.getElementById('flash');
const btnS = document.getElementById('btnS');
const btnR = document.getElementById('btnR');
const btnA = document.getElementById('btnA');
const errEl = document.getElementById('err');
const result = document.getElementById('result');
const myHand = document.getElementById('myHand');
const board = document.getElementById('board');
const winPct = document.getElementById('winPct');
const winSub = document.getElementById('winSub');
const handStr = document.getElementById('handStr');
const handSub = document.getElementById('handSub');
const opponents = document.getElementById('opponents');
const winBarWrap = document.getElementById('winBarWrap');
const winBar = document.getElementById('winBar');
const winBarPct = document.getElementById('winBarPct');
const analysisText = document.getElementById('analysisText');

let b64 = null, mode = 'live';

function setBadge(t, cls) { badge.textContent = t; badge.className = 'badge ' + (cls||''); }
function showErr(m) { errEl.textContent = m; errEl.className = 'err show'; setTimeout(() => errEl.className = 'err', 5000); }

async function startCam() {
  if (!navigator.mediaDevices?.getUserMedia) { fail(); return; }
  for (const c of [{ video:{ facingMode:{ ideal:'environment' } }, audio:false }, { video:true, audio:false }]) {
    try {
      const s = await navigator.mediaDevices.getUserMedia(c);
      video.srcObject = s;
      video.onloadedmetadata = () => video.play().catch(()=>{});
      video.play().catch(()=>{});
      return;
    } catch(e) { console.warn(e.name); }
  }
  fail();
}

function fail() {
  video.style.display = 'none'; nocam.style.display = 'flex';
  btnS.className = 'btn-shutter off'; setBadge('KEIN ZUGRIFF','off');
}

document.addEventListener('visibilitychange', () => {
  if (!document.hidden && video.srcObject && mode === 'live') video.play().catch(()=>{});
});

btnS.addEventListener('click', () => {
  if (mode !== 'live') return;
  flash.style.opacity = '1';
  setTimeout(() => flash.style.opacity = '0', 150);
  const w = video.videoWidth||640, h = video.videoHeight||480;
  canvas.width = w; canvas.height = h;
  canvas.getContext('2d').drawImage(video, 0, 0, w, h);
  const url = canvas.toDataURL('image/jpeg', 0.9);
  b64 = url.split(',')[1];
  preview.src = url; preview.style.display = 'block';
  video.style.display = 'none';
  mode = 'captured';
  setBadge('AUFGENOMMEN');
  btnR.classList.add('show'); btnA.classList.add('show');
});

btnR.addEventListener('click', () => {
  preview.style.display = 'none'; video.style.display = 'block';
  video.play().catch(()=>{});
  b64 = null; mode = 'live';
  setBadge('LIVE'); btnR.classList.remove('show'); btnA.classList.remove('show');
  result.classList.remove('show');
  resetStats();
});

function resetStats() {
  myHand.textContent = '—'; board.textContent = '—';
  winPct.textContent = '—'; winPct.className = 'stat-value green';
  handStr.textContent = '—'; handSub.textContent = '—';
  opponents.textContent = '—'; winBarWrap.style.display = 'none';
  winBar.style.width = '0%'; analysisText.textContent = '';
}

const PROMPT = `Du bist ein Poker-Analyse-Experte. Analysiere dieses Pokertisch-Bild sehr genau.

Erkenne und extrahiere:
1. MEINE STARTHAND (die 2 Karten des Spielers, z.B. "A♠ K♥")
2. BOARD KARTEN (Flop/Turn/River falls sichtbar, z.B. "J♦ 9♣ 3♥")
3. ANZAHL AKTIVER GEGNER am Tisch (nur die die noch im Spiel sind)
4. POSITION (falls erkennbar: UTG, MP, CO, BTN, SB, BB)

Berechne dann:
- GEWINNWAHRSCHEINLICHKEIT in % (realistisch gegen typische Ranges, berücksichtige Anzahl Gegner)
- HAND STÄRKE KATEGORIE (Premium / Stark / Mittel / Schwach / Marginal)
- EMPFEHLUNG (Raise / Call / Fold / Check) mit kurzem Grund

Antworte NUR in diesem JSON-Format, kein Text davor oder danach:
{
  "myHand": "A♠ K♥",
  "board": "J♦ 9♣ 3♥",
  "opponents": 3,
  "position": "BTN",
  "winPct": 58,
  "handStrength": "Stark",
  "handName": "Top Pair",
  "action": "Raise",
  "actionReason": "Top Pair top Kicker, Value gegen schwächere Aces und Draws",
  "analysis": "Deine Hand AK hat den Flop gut getroffen mit Top Pair Top Kicker auf J♦9♣3♥. Gegen 3 Gegner mit typischen Ranges (broadway hands, connectors, pocket pairs) hast du ~58% Equity. Ein Raise ist hier optimal um Value zu extrahieren und Draws zu bestrafen. Achte auf Runner-Runner Straights und Sets.",
  "flopTexture": "Nass (connected, zwei Farben)",
  "potOdds": "gut"
}

Falls keine Karten erkennbar sind, setze myHand auf "Nicht erkennbar" und erkläre im analysis-Feld was du siehst.`;

btnA.addEventListener('click', async () => {
  if (!b64 || mode === 'analyzing') return;
  mode = 'analyzing';
  setBadge('ANALYSIERE...', 'busy');
  scan.classList.add('on');
  btnA.style.opacity = '0.3'; btnA.style.pointerEvents = 'none';
  btnR.style.opacity = '0.3'; btnR.style.pointerEvents = 'none';
  resetStats();
  result.classList.add('show');
  analysisText.innerHTML = '<span class="cursor"></span>';

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{ 'Content-Type':'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages:[{ role:'user', content:[
          { type:'image', source:{ type:'base64', media_type:'image/jpeg', data:b64 } },
          { type:'text', text:PROMPT }
        ]}]
      })
    });

    if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.error?.message||'API Fehler '+res.status); }
    const data = await res.json();
    const raw = data.content?.map(x=>x.text||'').join('') || '';

    let parsed;
    try {
      const clean = raw.replace(/```json|```/g,'').trim();
      parsed = JSON.parse(clean);
    } catch(e) {
      // fallback: show raw text
      analysisText.textContent = raw;
      return;
    }

    // Fill cards
    myHand.textContent = parsed.myHand || '—';
    board.textContent = parsed.board && parsed.board !== 'null' ? parsed.board : 'Kein Board';

    // Win %
    if (parsed.winPct) {
      const pct = parseInt(parsed.winPct);
      winPct.textContent = pct + '%';
      winPct.className = 'stat-value ' + (pct >= 60 ? 'green' : pct >= 40 ? 'amber' : 'red');
      winSub.textContent = 'vs ' + (parsed.opponents||'?') + ' Gegner';
      winBarWrap.style.display = 'flex';
      winBarWrap.style.flexDirection = 'column';
      winBarWrap.style.gap = '8px';
      setTimeout(() => { winBar.style.width = pct + '%'; winBarPct.textContent = pct + '%'; }, 100);
    }

    // Hand strength
    if (parsed.handStrength) {
      handStr.textContent = parsed.handStrength;
      const s = parsed.handStrength.toLowerCase();
      handStr.className = 'stat-value ' + (s.includes('premium') || s.includes('stark') ? 'green' : s.includes('mittel') ? 'amber' : 'red');
      handSub.textContent = parsed.handName || '';
    }

    opponents.textContent = parsed.opponents || '—';

    // Action badge in analysis
    const action = parsed.action || '';
    const actionColor = action === 'Fold' ? '#ff3d3d' : action === 'Raise' ? '#00c853' : '#ffab00';
    const actionIcon = action === 'Fold' ? '✕' : action === 'Raise' ? '↑' : '→';

    const analysisHTML = `<span style="display:inline-block;background:${actionColor}22;color:${actionColor};border:1px solid ${actionColor}44;border-radius:6px;padding:2px 10px;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:1px;margin-bottom:10px;">${actionIcon} ${action.toUpperCase()}</span>
<span style="font-size:12px;color:#888;"> ${parsed.actionReason||''}</span>

${parsed.analysis||''}

${parsed.flopTexture ? '🃏 Flop-Textur: ' + parsed.flopTexture : ''}`;

    // Typewriter
    analysisText.innerHTML = '';
    const lines = analysisHTML;
    let i = 0;
    const cur = document.createElement('span'); cur.className = 'cursor';
    function type() {
      if (i < lines.length) {
        analysisText.innerHTML = lines.slice(0,++i);
        analysisText.appendChild(cur);
        analysisText.scrollTop = 9999;
        setTimeout(type, 8);
      } else cur.remove();
    }
    type();

  } catch(e) {
    analysisText.textContent = '';
    showErr('Fehler: ' + e.message);
  } finally {
    mode = 'captured';
    setBadge('AUFGENOMMEN');
    scan.classList.remove('on');
    btnA.style.opacity = ''; btnA.style.pointerEvents = '';
    btnR.style.opacity = ''; btnR.style.pointerEvents = '';
  }
});

startCam();
</script>
</body>
</html>
